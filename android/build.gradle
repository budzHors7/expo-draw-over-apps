plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.drawoverapps'
version = '55.0.0'

android {
  namespace "expo.modules.drawoverapps"
  defaultConfig {
    versionCode 1
    versionName "55.0.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  compileOnly("com.facebook.react:react-android")
}
